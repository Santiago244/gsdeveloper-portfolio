<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">3D toadstool mushroom logo for gsdeveloper in teal with black spots</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">An original teal toadstool mushroom with black spots, rendered with 3D shading, with a GS monogram on the stem, representing a software developer brand.</desc>
<defs>
<linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#6FCBA9"/>
<stop offset="55%" stop-color="#2FAA82"/>
<stop offset="100%" stop-color="#1F7A5C"/>
</linearGradient>
<linearGradient id="capShade" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1F7A5C" stop-opacity="0"/>
<stop offset="100%" stop-color="#124D3A" stop-opacity="0.55"/>
</linearGradient>
<linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#FFFFFF"/>
<stop offset="55%" stop-color="#F3F1E9"/>
<stop offset="100%" stop-color="#D3D1C7"/>
</linearGradient>
